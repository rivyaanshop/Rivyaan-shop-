<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Collective | Premium Jewelry</title>
    <style>
        :root { --main-pink: #f8c8dc; --dark-pink: #e09fb8; --gold: #d4af37; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f8; margin: 0; padding: 0; color: #333; }
        
        /* Header & Hero Section */
        header { background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://i.ibb.co/LzYv3zN/butterfly-set-full.jpg'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--main-pink); }
        .brand-logo { font-size: 45px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin: 0; color: #000; }
        .tagline { font-style: italic; color: var(--gold); font-size: 20px; margin-top: 10px; }

        /* Grid Layout */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .section-title { text-align: center; font-size: 24px; margin-bottom: 30px; border-bottom: 2px solid var(--main-pink); display: inline-block; padding-bottom: 5px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        
        /* Product Cards */
        .product-card { background: #fff; border-radius: 15px; border: 1px solid #eee; padding: 15px; text-align: center; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .product-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .product-price { color: #2ecc71; font-weight: 900; font-size: 18px; margin-bottom: 15px; }
        
        .buy-btn { background: #ff4d6d; color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: block; font-weight: bold; font-size: 14px; }
        
        /* Social Buttons */
        .social-section { margin-top: 40px; }
        .social-link { display: flex; align-items: center; justify-content: space-between; background: #25D366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .social-link.tg { background: #0088cc; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }

        footer { background: #fff; padding: 20px; text-align: center; font-size: 12px; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1 class="brand-logo">Rivyaan Collective</h1>
        <div class="tagline">Elegance in Every Detail ✨</div>
    </header>

    <div class="container" style="text-align: center;">
        <h2 class="section-title">✨ FEATURED COLLECTION ✨</h2>
        
        <div class="product-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <img src="https://i.ibb.co/LzYv3zN/butterfly-set-full.jpg" alt="Pendant">
                <div class="product-name">Butterfly Pendant</div>
                <div class="product-price">₹79/-</div>
                <a href="https://fktr.in/h60m1cC" class="buy-btn">Buy Now</a>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <img src="https://i.ibb.co/LzYv3zN/butterfly-set-full.jpg" alt="Bracelet">
                <div class="product-name">Beaded Bracelet</div>
                <div class="product-price">₹79/-</div>
                <a href="https://fktr.in/h60m1cC" class="buy-btn">Buy Now</a>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <img src="https://i.ibb.co/LzYv3zN/butterfly-set-full.jpg" alt="Earrings">
                <div class="product-name">Stud Earrings</div>
                <div class="product-price">₹79/-</div>
                <a href="https://fktr.in/h60m1cC" class="buy-btn">Buy Now</a>
            </div>

            <!-- Product 4 -->
            <div class="product-card" style="background: #fff0f3; border: 1px dashed #ff4d6d;">
                <img src="https://i.ibb.co/LzYv3zN/butterfly-set-full.jpg" alt="Full Set">
                <div class="product-name">Full Combo Set</div>
                <div class="product-price">₹79/-</div>
                <a href="https://fktr.in/h60m1cC" class="buy-btn" style="background: #000;">Loot Deal</a>
            </div>
        </div>

        <div class="social-section">
            <a href="#" class="social-link">
                <span>💬 Join WhatsApp Channel</span>
                <span>➔</span>
            </a>
            <a href="#" class="social-link tg">
                <span>✈️ Join Telegram Channel</span>
                <span>➔</span>
            </a>
        </div>
    </div>

    <footer>
        © 2026 Rivyaan Collective | All Rights Reserved ❤️
    </footer>

</body>
</html>
