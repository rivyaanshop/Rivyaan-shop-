<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Collective</title>
    <style>
        body { font-family: sans-serif; background-color: #D3D3D3; color: #000000; text-align: center; margin: 0; padding: 0; }
        .moving-bar { background: #000000; color: #ffffff; padding: 10px 0; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .brand-name { font-size: 36px; font-weight: 900; margin: 20px 0; text-transform: uppercase; }
        .image-box { width: 280px; margin: 0 auto 20px auto; border: 4px solid #000; border-radius: 15px; overflow: hidden; background: #fff; }
        .product-img { width: 100%; display: block; }
        .container { max-width: 400px; margin: 0 auto; padding: 0 15px; }
        .btn { background: #000; color: #fff; padding: 18px; margin-bottom: 12px; display: block; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .price { color: #00FF00; font-size: 22px; font-weight: 900; }
        .social { padding: 12px; margin-bottom: 8px; border-radius: 8px; display: block; text-decoration: none; color: white; font-weight: bold; }
        .wa { background: #25D366; }
        .tg { background: #0088cc; }
        .footer { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="moving-bar">🚀 SPECIAL OFFER: BUTTERFLY SET @ ₹79! 🚀</div>
    
    <div class="brand-name">Rivyaan Collective</div>

    <div class="image-box">
        <img src="https://assets.myntassets.com/dpr_2,q_60,w_200,c_limit,fl_progressive/assets/images/23473950/2023/6/15/d4f6470d-5878-452f-87d3-6e3a6a9b441f1686828551105-Jewellery-Set-1291686828550742-1.jpg" class="product-img" alt="Jewelry">
    </div>

    <div class="container">
        <a href="https://fktr.in/h60m1cC" class="btn">
            🦋 Butterfly Jewelry Set<br>
            <span class="price">Loot Price: ₹79/-</span>
        </a>
        <a href="https://whatsapp.com/channel/your_link" class="social wa">📢 Join WhatsApp</a>
        <a href="https://t.me/your_link" class="social tg">✈️ Join Telegram</a>
    </div>

    <div class="footer">Earn ₹20 - ₹100 on every sale! 💰</div>
</body>
</html>
