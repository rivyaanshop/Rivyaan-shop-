
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Collective</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #000080, #4169E1, #8A2BE2); 
            background-attachment: fixed;
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 15px; 
        }
        .header-banner { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            color: #ffd700; 
            padding: 10px; 
            font-weight: bold; 
            font-size: 13px; 
            border-radius: 50px; 
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .brand-name { 
            font-size: 34px; 
            color: #ffffff; 
            margin-bottom: 25px; 
            font-family: 'Cursive', sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        .product-img { 
            width: 100%; 
            max-width: 320px; 
            border-radius: 20px; 
            border: 3px solid rgba(255, 255, 255, 0.3); 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .links-container { max-width: 400px; margin: 0 auto; }
        .link-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: block; 
            text-decoration: none; 
            color: #1a1a1a; 
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .price-tag { 
            color: #d32f2f; 
            font-size: 22px; 
            font-weight: 800; 
            display: block; 
            margin-top: 5px; 
        }
        .whatsapp-btn { 
            background: #25D366 !important; 
            color: white !important; 
            border: none; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-banner">✨ Welcome to RIVYAAN COLLECTIVE ✨</div>
    
    <div class="brand-name">Rivyaan Collective</div>

    <img src="https://m.media-amazon.com/images/I/71Xm2WpWnGL._AC_UY1100_.jpg" alt="Butterfly Set" class="product-img">

    <div class="links-container">
        <a href="https://fktr.in/h60m1cC" class="link-card">
            🦋 Exclusive Butterfly Jewelry Set
            <span class="price-tag">Loot Price: ₹79 Only! 🔥</span>
            <small style="color: #666;">(Limited Stock Deal)</small>
        </a>

        <a href="https://wa.me/91XXXXXXXXXX" class="link-card whatsapp-btn">
            💬 Order via WhatsApp
        </a>
    </div>

    <p style="font-size: 12px; margin-top: 30px; opacity: 0.8;">© 2026 Rivyaan Collective.</p>

</body>
</html>
