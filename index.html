 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Shop | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-mix: linear-gradient(180deg, #021024 0%, #052659 50%, #021024 100%);
            --gold: linear-gradient(90deg, #fceabb, #f8b500);
            --white: #ffffff;
        }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg-mix); background-attachment: fixed; color: var(--white); text-align: center; overflow-x: hidden; }
        
        .offer-bar { background: var(--gold); color: #000; padding: 8px 0; font-size: 13px; font-weight: 800; }
        
        header { padding: 20px 20px 10px 20px; background: rgba(255,255,255,0.05); }
        .logo { font-family: 'Pacifico', cursive; font-size: 38px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        /* Fixed Stories Style (Ab ye upar hi rahega) */
        .stories-container {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }
        .stories { 
            display: flex; 
            gap: 15px; 
            padding: 0 15px; 
            overflow-x: auto; 
            scrollbar-width: none;
        }
        .stories::-webkit-scrollbar { display: none; }
        .story-item { flex-shrink: 0; width: 75px; text-align: center; }
        .story-circle { 
            width: 65px; height: 65px; border-radius: 50%; 
            border: 2px solid #f8b500; padding: 3px; object-fit: cover; 
            background: #222;
        }
        .story-item p { font-size: 10px; margin-top: 5px; color: #fceabb; font-weight: 600; }
        
        .container { padding: 20px; max-width: 480px; margin: auto; }
        .product-card { background: white; border-radius: 25px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5); color: #222; }
        .product-img { width: 100%; height: 380px; object-fit: cover; background: #f0f0f0; }
        .details { padding: 20px; text-align: left; }
        .details h3 { margin: 0; font-size: 18px; font-weight: 800; }
        .price { font-size: 24px; font-weight: 900; color: #1a1a1a; margin-top: 10px; }
        .btn { display: block; padding: 15px; border-radius: 15px; text-decoration: none; text-align: center; font-size: 14px; font-weight: 800; color: white; background: #ff9900; margin-top: 15px; }

        .float-container { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .float-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="offer-bar"><marquee>✨ Special Offer: Free Delivery on All Orders | New Collection is Live! ✨</marquee></div>

    <header>
        <h1 class="logo">Rivyaan Shop</h1>
    </header>

    <div class="stories-container">
        <div class="stories">
            <div class="story-item">
                <img src="https://images.meesho.com/images/products/311651811/8p8sk_512.jpg" class="story-circle">
                <p>New Style</p>
            </div>
            <div class="story-item">
                <img src="https://m.media-amazon.com/images/I/718yG689-pL._AC_UY1100_.jpg" class="story-circle">
                <p>Trending</p>
            </div>
            <div class="story-item">
                <img src="https://images.meesho.com/images/products/311651811/8p8sk_512.jpg" class="story-circle">
                <p>Best Seller</p>
            </div>
            <div class="story-item">
                <img src="https://m.media-amazon.com/images/I/718yG689-pL._AC_UY1100_.jpg" class="story-circle">
                <p>Offers</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/718yG689-pL._AC_UY1100_.jpg" class="product-img">
            <div class="details">
                <h3>Floral Summer Midi Dress</h3>
                <div class="price">₹549</div>
                <a href="APKA_LINK" target="_blank" class="btn">Buy Now</a>
            </div>
        </div>
    </div>

    <div class="float-container">
        <a href="TELEGRAM_LINK" target="_blank" class="float-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="width:30px;"></a>
        <a href="WHATSAPP_LINK" target="_blank" class="float-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:30px;"></a>
    </div>

</body>
</html>
