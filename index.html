 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Shop | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-mix: linear-gradient(180deg, #021024 0%, #052659 50%, #021024 100%);
            --gold: linear-gradient(90deg, #fceabb, #f8b500);
            --white: #ffffff;
            --tg-blue: #0088cc;
            --wa-green: #25D366;
        }
        body { 
            font-family: 'Poppins', sans-serif;
            margin: 0; background: var(--bg-mix); 
            background-attachment: fixed; color: var(--white);
            text-align: center;
        }
        header { padding: 40px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .logo { 
            font-family: 'Pacifico', cursive; font-size: 45px; 
            background: var(--gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; margin: 0;
        }
        .container { padding: 20px; max-width: 480px; margin: auto; }
        .product-card { 
            background: white; border-radius: 30px; 
            margin-bottom: 30px; overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); color: #222;
        }
        .product-img { width: 100%; height: 400px; object-fit: cover; }
        .details { padding: 25px; text-align: left; }
        .details h3 { margin: 0; font-size: 19px; font-weight: 800; }
        .stars { color: #FFD700; margin: 8px 0; font-size: 14px; }
        .price { font-size: 26px; font-weight: 900; color: #1a1a1a; margin-bottom: 20px; }
        .btn { 
            display: block; padding: 16px; border-radius: 18px; 
            text-decoration: none; text-align: center; font-size: 14px; 
            font-weight: 800; color: white; text-transform: uppercase;
        }
        .amz { background: #ff9900; }
        .float-container { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .float-btn {
            width: 55px; height: 55px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 25px; text-decoration: none; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .float-wa { background: var(--wa-green); }
        .float-tg { background: var(--tg-blue); }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">Rivyaan Shop</h1>
        <p style="opacity: 0.8; font-size: 12px; letter-spacing: 2px;">LUXURY FASHION HUB</p>
    </header>
    <div class="container">
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/718yG689-pL._AC_UY1100_.jpg" class="product-img">
            <div class="details">
                <h3>Floral Summer Midi Dress</h3>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="price">₹549</div>
                <a href="#" class="btn amz">Buy Now</a>
            </div>
        </div>
    </div>
    <div class="float-container">
        <a href="#" class="float-btn float-tg">✈️</a>
        <a href="#" class="float-btn float-wa">📲</a>
    </div>
</body>
</html>
