<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivyaan Collective | Boutique</title>
    <style>
        :root {
            --bg-pink: #fff0f3;
            --soft-pink: #ffdae9;
            --deep-pink: #ff8fab;
            --text-color: #5e3a44;
        }
        body { 
            font-family: 'Georgia', serif; 
            background-color: var(--bg-pink); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            text-align: center;
        }
        
        /* Moving Offer Bar */
        .offer-bar { 
            background: #ffb3c1; 
            color: white; 
            padding: 10px 0; 
            font-size: 14px; 
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Elegant Header */
        header { 
            padding: 50px 20px; 
            background: white;
            border-bottom: 3px solid var(--soft-pink);
        }
        .brand { 
            font-size: 35px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin: 0;
            font-weight: lighter;
        }
        .tagline { 
            font-size: 16px; 
            font-style: italic; 
            opacity: 0.7; 
            margin-top: 5px;
        }

        .main-content { 
            max-width: 450px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }

        /* Image Display Card */
        .image-card {
            background: white;
            padding: 10px;
            border-radius: 30px 30px 5px 5px;
            box-shadow: 0 10px 30px rgba(255, 143, 171, 0.2);
            border: 2px solid var(--soft-pink);
        }
        .product-img { 
            width: 100%; 
            border-radius: 25px 25px 5px 5px; 
            display: block;
        }

        .product-info {
            background: white;
            padding: 20px;
            margin-top: -10px;
            border-radius: 0 0 20px 20px;
            border: 2px solid var(--soft-pink);
            border-top: none;
        }

        /* Buy Button */
        .buy-btn {
            display: block;
            background-color: var(--deep-pink);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.4);
            transition: 0.3s;
        }

        /* Social Links */
        .social-links { margin-top: 30px; }
        .social-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            border: 1px solid var(--soft-pink);
        }
        
        .footer-earn {
            margin-top: 25px;
            padding: 15px;
            border: 2px dashed var(--deep-pink);
            border-radius: 10px;
            font-weight: bold;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="offer-bar">✨ BUTTERFLY COLLECTION SPECIAL OFFER ✨</div>

    <header>
        <h1 class="brand">Rivyaan Collective</h1>
        <p class="tagline">Elegance in Every Detail</p>
    </header>

    <div class="main-content">
        <div class="image-card">
            <!-- Stable Link -->
            <img src="https://m.media-amazon.com/images/I/71Xm2WpWnGL._AC_SL1500_.jpg" class="product-img" alt="Jewelry Set">
        </div>
        
        <div class="product-info">
            <h3 style="margin: 0;">Complete Butterfly Set</h3>
            <p style="font-size: 14px; opacity: 0.8;">Necklace + Earrings + Bracelet</p>
            <a href="https://fktr.in/h60m1cC" class="buy-btn">
                Grab Deal @ ₹79 Only!
            </a>
        </div>

        <div class="social-links">
            <a href="YOUR_WA_LINK" class="social-box">💬 Join Our WhatsApp</a>
            <a href="YOUR_TG_LINK" class="social-box">✈️ Join Telegram</a>
        </div>

        <div class="footer-earn">
            💰 Earn ₹20 - ₹100 on Every Sale!
        </div>
        
        <p style="font-size: 10px; margin-top: 30px; opacity: 0.5;">© 2026 Rivyaan Collective</p>
    </div>

</body>
</html>
